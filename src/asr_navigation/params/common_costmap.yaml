obstacle_range: 1.5
raytrace_range: 2.0

transform_tolerance: 1.0

# Footprint FISIK robot (kotak ~0.54 x 0.64 m). JANGAN dikecilkan:
# ini dipakai costmap untuk cek tabrakan & menghitung radius keliling
# (circumscribed ~0.42 m) yang jadi dasar inflasi.
footprint:
  [[ 0.27,  0.32],
  [ 0.27, -0.32],
  [-0.27, -0.32],
  [-0.27,  0.32]]

inflation_layer:
  inflation_radius: 0.1
  cost_scaling_factor: 5.0

obstacle_layer:
  observation_sources: laser_scan_sensor thermal_blindspot

  laser_scan_sensor:
    sensor_frame: laser
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    inf_is_valid: true

  thermal_blindspot:
    sensor_frame: base_link
    data_type: LaserScan
    topic: /thermal_blindspot_scan
    marking: false #---> DIUBAH: true -> false (thermal cuma untuk marking, tidak raytrace clearing)
    clearing: true
    inf_is_valid: false
    obstacle_range: 1.5
    raytrace_range: 2.0
    observation_persistence: 0.0