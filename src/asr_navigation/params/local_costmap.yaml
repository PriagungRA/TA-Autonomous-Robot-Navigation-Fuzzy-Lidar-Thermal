local_costmap:
  global_frame: odom
  robot_base_frame: base_link

  update_frequency: 10.0
  publish_frequency: 5.0

  static_map: false
  rolling_window: true

  width: 4.0
  height: 4.0
  resolution: 0.05

  plugins:
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: laser_scan_sensor thermal_blindspot

    laser_scan_sensor:
      sensor_frame: laser
      data_type: LaserScan
      topic: /scan
      marking: true
      clearing: true
      inf_is_valid: true

    thermal_blindspot:
      sensor_frame: base_link
      data_type: LaserScan
      topic: /thermal_blindspot_scan
      marking: false
      clearing: true
      inf_is_valid: false
      observation_persistence: 0.0