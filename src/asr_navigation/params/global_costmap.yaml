global_costmap:
  global_frame: map
  robot_base_frame: base_link

  update_frequency: 5.0
  publish_frequency: 2.0

  static_map: true
  rolling_window: false

  plugins:
    - {name: static_layer,    type: "costmap_2d::StaticLayer"}
    - {name: obstacle_layer,  type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}

  obstacle_layer:
    observation_sources: laser_scan_sensor thermal_blindspot

    laser_scan_sensor:
      sensor_frame: laser
      data_type: LaserScan
      topic: /scan
      marking: true
      clearing: true
      inf_is_valid: true

    thermal_blindspot:
      sensor_frame: base_link
      data_type: LaserScan
      topic: /thermal_blindspot_scan
      marking: true
      clearing: true
      inf_is_valid: false
      obstacle_range: 1.0
      raytrace_range: 1.5
      observation_persistence: 0.0