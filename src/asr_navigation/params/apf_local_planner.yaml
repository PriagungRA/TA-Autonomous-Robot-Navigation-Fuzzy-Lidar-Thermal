PFLocalPlanner:
  # APF Core Gains
  attractive_gain: 1.5
  repulsive_gain: 3.0
  safe_obs_dist: 1.2
  safe_goal_dist: 1.0

  # # Safety parameters (Adjusted for slow-medium speed)
  # emergency_stop_dist: 0.35
  # lateral_avoidance_gain: 1.5

  max_local_goal_dist: 1.5
  
  # Velocity Constraints (Adjusted for slow-medium speed)
  max_linear_v: 0.2
  max_angular_v: 0.5
  goal_tolerance_linear: 0.2
  goal_tolerance_angular: 0.2
  
  # Robot Setup
  # robot_radius: 0.4
  robot_radius: 0.22
  cmd_frame_id: "base_link"
  goal_frame_id: "map"
  scan_topic: "/scan" # Remember to change this if your omni robot uses a different lidar topic!
  
  # APF Map Grid Parameters
  field_w: 4.0
  field_h: 4.0
  local_map_resolution: 0.05
  min_obstacle_size_px: 20
  
  # Debugging
  verbose: true